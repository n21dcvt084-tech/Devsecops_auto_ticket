name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  PYTHON_VERSION: "3.13"

jobs:
  secret-guard:
    name: Secret Guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Block tracked secrets
        shell: bash
        run: |
          set -euo pipefail

          forbidden_files="$(
            git ls-files \
              | grep -E '(^|/)(\.env($|\.)|.*\.(pem|key|p12|pfx|jks|keystore)$|credentials\.json$|service-account.*\.json$|secrets?/)' \
              | grep -vE '(^|/)\.env\.example$' \
              || true
          )"

          if [ -n "$forbidden_files" ]; then
            echo "Blocked: these tracked files look like secrets or private credentials:"
            echo "$forbidden_files"
            exit 1
          fi

          if git grep -I -n -E '(AKIA[0-9A-Z]{16}|-----BEGIN ([A-Z ]+)?PRIVATE KEY-----|ghp_[A-Za-z0-9_]{20,}|github_pat_[A-Za-z0-9_]{20,}|glpat-[A-Za-z0-9_-]{20,}|xox[baprs]-[A-Za-z0-9-]{10,}|(api[_-]?key|token|secret|password)[[:space:]]*[:=][[:space:]]*['"'"'"][^'"'"'"]{12,})' -- ':!tests/**' ':!*.md' ':!.env.example' ':!.github/workflows/ci.yml' > secret-findings.txt; then
            echo "Blocked: possible hardcoded secret found:"
            cat secret-findings.txt
            exit 1
          fi

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: secret-guard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: python -m pytest -q

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      - secret-guard
      - unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          tags: devsecops-auto-ticket:${{ github.sha }}

  docker-publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs:
      - docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ github.sha }}
            ${{ steps.image.outputs.name }}:latest
