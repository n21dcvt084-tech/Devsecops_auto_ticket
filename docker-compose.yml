services:
  migrate:
    build: .
    env_file:
      - .env
    command: ["alembic", "upgrade", "head"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      postgres:
        condition: service_healthy

  app:
    build: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    init: true
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      migrate:
        condition: service_completed_successfully

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: devsecops
      POSTGRES_USER: devsecops
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devsecops}
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devsecops -d devsecops"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
